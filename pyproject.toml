[build-system]
requires = ["setuptools>=82", "wheel"]
build-backend = "setuptools.build_meta"

[tool.corio.dependencies]
dev = ["logging", "version.dev", "debug", "sets", "yaml", "db.document"]
install = []
test = ["pytest-cov"]
yaml = ["yamlscript", "pyyaml"]
logging = ["logfire", "version"]
parallel = ["dask[bag]", "distributed", "bokeh"]
tokenization = ["tokenizers"]
augmentation = ["faker", "sre_yield"]
process = ["logging"]
profiling = ["contexttimer"]
"docker.client" = ["python-on-whales"]
unicode = ["Unidecode"]
version = []
"version.dev" = ["semver"]
spaces = ["netrc"]
netrc = ["tinynetrc"]
hfh = ["huggingface_hub"]
merging = ["deepmerge"]
api = ["fastapi", "uvicorn[standard]", "logging", "dm", "logfire[fastapi]"]
ai = ["peft", "transformers[sentencepiece]", "torchvision", "torchaudio", "dm"]
dm = ["pydantic", "pydantic-extra-types", "pycountry"]
"openai.api" = ["openai"]
"ai.client" = ["logging", "dm", "openai.api", "pydantic-ai[logfire,openai]", "ollama"]
json-fix = ["json_repair"]
semantic = ["sentence_transformers", "metric"]
metric = ["tabular"]
tabular = ["pandas", "tabulate", "openpyxl", "odfpy", "deepdiff"]
html = ["html2text"]
interface = ["flet[all] <0.80.0", "flet-video", "flet-webview"]
"google.api" = ["google-auth", "google-auth-oauthlib", "google-auth-httplib2", "google-api-python-client"]
caching = ["diskcache", "cachetools"]
pdf = ["pymupdf", "dm", "pymupdf4llm"]
debug = ["pydevd-pycharm~=251.25410.159"]
sets = ["pydantic-settings", "dm", "yaml"]
"path.app" = ["appdirs"]
"path.type" = ["filetype"]
dns = ["dnspython[doh]", "http"]
patterns = ["regex"]
http = ["httpx", "httpx_retries", "logging", "logfire[httpx]"]
setup = ["setuptools"]
webhook = ["http"]
browsers = ["playwright"]
db = []
"db.document" = ["beanie[odm]"]
mqtt = ["aiomqtt"]
av = ["av"]
env = []
"env.io" = ["dotenv"]
ha = ["env.io"]
"ha.api" = ["ha", "homeassistant_api", "aiohasupervisor"]
doc = ["mkdocs", "mkdocs-material", "mkdocstrings[python]", "mike", "mkdocs-include-dir-to-nav"]
youtube = ["pytubefix"]
infra = ["version.dev", "logging", "setup", "doc", "sets", "build", "twine", "packaging", "vcs", "docker.client", "merging", "http", "api", "tomlkit"]
vcs = ["pygit2"]
tasmota = ["decode-config", "esptool"]
encrypt = ["pyrage"]
secrets = ["encrypt", "env.io", "yaml", "logging", "sets", "vcs"]

[tool.setuptools]
script-files = ["scripts/opt-dev-init", "scripts/docker-prune", "scripts/vlc-tn", "scripts/ha-addon-launch", "scripts/install-ys", "scripts/tasmota-config", "scripts/download", "scripts/run-script", "scripts/ssh-auth", "scripts/cru", "scripts/docs-serve", "scripts/ssh-serve", "scripts/set-secure-path", "scripts/vm-launch", "scripts/auth-token", "scripts/set-user-sudo", "scripts/docker-build-bases", "scripts/fmtr-test-script", "scripts/compose-update", "scripts/add-ve-shell", "scripts/apt-headless", "scripts/snips-install", "scripts/install-ts", "scripts/tasmota-flash", "scripts/docs-deploy", "scripts/infra-sync", "scripts/parse-args", "scripts/docker-install-deps", "scripts/pypi-reserve", "scripts/install-docker", "scripts/set-password", "scripts/tasmota-terminal", "scripts/mirror-dir", "scripts/compress-dir", "scripts/pypi-check", "scripts/git-clone", "scripts/docker-sandbox", "scripts/docker-install-prod", "scripts/docker-sandbox-init", "scripts/install-browser", "scripts/docker-build-bases-dev", "scripts/apt-essentials", "scripts/encrypt-secrets", "scripts/add-user-path", "scripts/infra", "scripts/add-service"]

[tool.setuptools.packages.find]
where = ["."]
include = ["corio*"]
namespaces = false

[tool.setuptools.package-data]
corio = ["version", "meta.json"]

[project]
name = "corio"
version = "2.1.0-alpha003"
description = "Collection of high-level tools to simplify everyday development tasks, with a focus on AI/ML"
